name: Publish Python Packages

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: read
  id-token: write

env:
  CARGO_TERM_COLOR: always
  PYTHON_VERSION: '3.11'

jobs:
  validate-version:
    name: Validate release version
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Check version alignment
        shell: bash
        run: |
          set -euo pipefail
          python scripts/sync_python_package_versions.py --check --tag "$GITHUB_REF_NAME"

  build-querymt:
    name: Build querymt wheels
    needs: validate-version
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact_suffix: linux-x86_64
          - os: macos-13
            artifact_suffix: macos-x86_64
          - os: macos-14
            artifact_suffix: macos-arm64
          - os: windows-latest
            artifact_suffix: windows-x86_64
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo dependencies
        uses: swatinem/rust-cache@v2
        with:
          key: publish-querymt-${{ matrix.os }}

      - name: Install maturin
        run: python -m pip install --upgrade pip maturin

      - name: Build wheel
        run: maturin build --release --manifest-path crates/py/querymt-py/Cargo.toml --out dist

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v7
        with:
          name: querymt-wheel-${{ matrix.artifact_suffix }}
          path: dist/*.whl
          if-no-files-found: error

  build-querymt-sdist:
    name: Build querymt sdist
    needs: validate-version
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo dependencies
        uses: swatinem/rust-cache@v2
        with:
          key: publish-querymt-sdist

      - name: Install maturin
        run: python -m pip install --upgrade pip maturin

      - name: Build sdist
        run: maturin sdist --manifest-path crates/py/querymt-py/Cargo.toml --out dist

      - name: Upload sdist artifact
        uses: actions/upload-artifact@v7
        with:
          name: querymt-sdist
          path: dist/*
          if-no-files-found: error

  publish-querymt:
    name: Publish querymt to PyPI
    needs:
      - build-querymt
      - build-querymt-sdist
    runs-on: ubuntu-latest
    environment:
      name: pypi-querymt
      url: https://pypi.org/project/querymt/
    permissions:
      id-token: write
    steps:
      - name: Download querymt wheel artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: querymt-wheel-*
          path: dist
          merge-multiple: true

      - name: Download querymt sdist artifact
        uses: actions/download-artifact@v8
        with:
          name: querymt-sdist
          path: dist

      - name: Publish querymt
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist

  build-querymt-agent:
    name: Build querymt-agent wheels
    needs:
      - validate-version
      - publish-querymt
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact_suffix: linux-x86_64
          - os: macos-13
            artifact_suffix: macos-x86_64
          - os: macos-14
            artifact_suffix: macos-arm64
          - os: windows-latest
            artifact_suffix: windows-x86_64
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo dependencies
        uses: swatinem/rust-cache@v2
        with:
          key: publish-querymt-agent-${{ matrix.os }}

      - name: Install maturin
        run: python -m pip install --upgrade pip maturin

      - name: Build wheel
        run: maturin build --release --manifest-path crates/py/querymt-agent-py/Cargo.toml --out dist

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v7
        with:
          name: querymt-agent-wheel-${{ matrix.artifact_suffix }}
          path: dist/*.whl
          if-no-files-found: error

  build-querymt-agent-sdist:
    name: Build querymt-agent sdist
    needs:
      - validate-version
      - publish-querymt
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo dependencies
        uses: swatinem/rust-cache@v2
        with:
          key: publish-querymt-agent-sdist

      - name: Install maturin
        run: python -m pip install --upgrade pip maturin

      - name: Build sdist
        run: maturin sdist --manifest-path crates/py/querymt-agent-py/Cargo.toml --out dist

      - name: Upload sdist artifact
        uses: actions/upload-artifact@v7
        with:
          name: querymt-agent-sdist
          path: dist/*
          if-no-files-found: error

  publish-querymt-agent:
    name: Publish querymt-agent to PyPI
    needs:
      - build-querymt-agent
      - build-querymt-agent-sdist
    runs-on: ubuntu-latest
    environment:
      name: pypi-querymt-agent
      url: https://pypi.org/project/querymt-agent/
    permissions:
      id-token: write
    steps:
      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Wait for querymt release to become visible on PyPI
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import json
          import os
          import time
          import urllib.request

          version = os.environ["GITHUB_REF_NAME"][1:]
          url = "https://pypi.org/pypi/querymt/json"

          for attempt in range(20):
              with urllib.request.urlopen(url) as response:
                  payload = json.load(response)
              if version in payload.get("releases", {}):
                  print(f"querymt {version} is visible on PyPI")
                  break
              if attempt == 19:
                  raise SystemExit(f"querymt {version} did not appear on PyPI in time")
              print(f"querymt {version} not visible yet, retrying in 15 seconds")
              time.sleep(15)
          PY

      - name: Download querymt-agent wheel artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: querymt-agent-wheel-*
          path: dist
          merge-multiple: true

      - name: Download querymt-agent sdist artifact
        uses: actions/download-artifact@v8
        with:
          name: querymt-agent-sdist
          path: dist

      - name: Publish querymt-agent
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
