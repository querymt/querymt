name: Build & Publish Provider Plugins

on:
  push:
    branches: [ main ]
    tags: [ 'v*.*.*' ]
  workflow_dispatch:

permissions:
  contents: write
  packages: write
  deployments: write
  id-token: write

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.compute.outputs.matrix }}

    steps:
      - name: Check out full history
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Determine which plugins need rebuilding
        id: compute
        run: |
          BASE=${{ github.event.before }}
          HEAD=${{ github.sha }}

          # all subfolders under crates/providers
          mapfile -t ALL < <(find crates/providers -maxdepth 1 -mindepth 1 -type d -printf '%f\n')

          if [[ "$GITHUB_EVENT_NAME" == "workflow_dispatch" ]]; then
            PROVIDERS=( "${ALL[@]}" )
          # if this is the very first commit (BASE is all zeros), rebuild everything
          elif [[ "$BASE" == "0000000000000000000000000000000000000000" ]]; then
            PROVIDERS=( "${ALL[@]}" )
          else
            # list changed files between BASE and HEAD
            CHANGED=$(git diff --name-only $BASE $HEAD)

            PROVIDERS=()
            for f in $CHANGED; do
              # if the querymt library changed, rebuild/test all plugins
              if [[ $f =~ ^crates/querymt/ ]]; then
                PROVIDERS=( "${ALL[@]}" )
                break
              fi

              # if a provider crate changed, pick it up
              if [[ $f =~ ^crates/providers/([^/]+)/ ]]; then
                name=${BASH_REMATCH[1]}
                # de-dup
                if [[ ! " ${PROVIDERS[*]} " =~ " $name " ]]; then
                  PROVIDERS+=( "$name" )
                fi
              fi
            done
          fi

          if [ ${#PROVIDERS[@]} -eq 0 ]; then
            PROVIDERS=( "noop" )
          fi

          echo "Final plugin list: ${PROVIDERS[*]}"

          # format as JSON list for the matrix
          entries=()
          for p in "${PROVIDERS[@]}"; do
            toml="crates/providers/$p/Cargo.toml"
            detected_type=""
            if [[ -f "$toml" ]]; then
              detected_type=$(
                awk -F'=' '
                  $0 ~ /^\[package\.metadata\.qmt\]/ {in_qmt=1; next}
                  in_qmt && $0 ~ /^\[/ {in_qmt=0}
                  in_qmt {
                    key=$1
                    gsub(/^[ \t]+|[ \t]+$/, "", key)
                    if (key == "type") {
                      gsub(/"/, "", $2); gsub(/ /, "", $2); print $2; exit
                    }
                  }
                ' "$toml"
              )
            fi
            if [[ "$detected_type" == "wasm" ]]; then
              entries+=( "{\"crate\":\"$p\",\"provider_type\":\"$detected_type\"}" )
            fi
          done

          if [ ${#entries[@]} -eq 0 ]; then
            entries+=( "{\"crate\":\"noop\",\"provider_type\":\"noop\"}" )
          fi

          # note: join on commas, not spaces
          joined=$(IFS=, ; echo "${entries[*]}")
          matrix="{\"include\":[${joined}]}"
          echo "matrix=$matrix" >> $GITHUB_OUTPUT

  publish-providers-json:
    needs: [detect-changes, publish-plugins]
    runs-on: ubuntu-latest
    if: ${{ needs.publish-plugins.result == 'success' && !contains(needs.detect-changes.outputs.matrix, '"crate":"noop"') }}

    steps:
      - name: Check out code
        uses: actions/checkout@v7

      - name: Generate providers JSON
        shell: bash
        run: |
          set -euo pipefail

          if [[ "$GITHUB_REF_TYPE" == "tag" ]]; then
            TAG_NAME="${GITHUB_REF_NAME}"
            if [[ "$TAG_NAME" == v* ]]; then
              TAG_NAME="${TAG_NAME#v}"
            fi
            IMAGE_TAG="stable"
            PROVIDER_VERSION="${TAG_NAME}"
          else
            IMAGE_TAG="latest"
            PROVIDER_VERSION="latest"
          fi

          output="providers.json"
          versioned="providers.versioned.json"
          echo '{"providers":[' > "$output"
          echo '{"providers":[' > "$versioned"

          first=1
          for toml in crates/providers/*/Cargo.toml; do
            name=$(basename "$(dirname "$toml")")

            detected_type=$(
              awk -F'=' '
                $0 ~ /^\[package\.metadata\.qmt\]/ {in_qmt=1; next}
                in_qmt && $0 ~ /^\[/ {in_qmt=0}
                in_qmt {
                  key=$1
                  gsub(/^[ \t]+|[ \t]+$/, "", key)
                  if (key == "type") {
                    gsub(/"/, "", $2); gsub(/ /, "", $2); print $2; exit
                  }
                }
              ' "$toml"
            )

            if [[ "$detected_type" != "wasm" ]]; then
              continue
            fi

            if [[ "$first" -eq 0 ]]; then
              echo ',' >> "$output"
              echo ',' >> "$versioned"
            fi
            echo "{\"name\":\"$name\",\"path\":\"oci://ghcr.io/${{ github.repository_owner }}/$name:${IMAGE_TAG}\"}" >> "$output"
            echo "{\"name\":\"$name\",\"path\":\"oci://ghcr.io/${{ github.repository_owner }}/$name:${PROVIDER_VERSION}\"}" >> "$versioned"
            first=0
          done

          echo ']}' >> "$output"
          echo ']}' >> "$versioned"
          cat "$output"
          cat "$versioned"

          echo "PROVIDER_VERSION=${PROVIDER_VERSION}" >> "$GITHUB_ENV"
          echo "IMAGE_TAG=${IMAGE_TAG}" >> "$GITHUB_ENV"

      - name: Check out provider index branch
        uses: actions/checkout@v7
        with:
          ref: provider-index
          path: provider-index
          fetch-depth: 1

      - name: Prepare provider index workspace
        shell: bash
        run: |
          set -euo pipefail
          cp providers.json "provider-index/${IMAGE_TAG}.json"
          if [[ "$PROVIDER_VERSION" != "latest" ]]; then
            cp providers.versioned.json "provider-index/${PROVIDER_VERSION}.json"
          fi

      - name: Commit and push provider index changes
        working-directory: provider-index
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git diff --cached --quiet && exit 0
          git commit -m "update provider index for ${GITHUB_REF_NAME}"
          git push origin provider-index

  publish-plugins:
    needs: detect-changes
    runs-on: ubuntu-latest
    strategy:
      matrix: ${{ fromJson(needs.detect-changes.outputs.matrix) }}

    steps:
      - name: No crates changed
        if: matrix.crate == 'noop'
        run: echo "✅ No plugin crates to build—skipping."

      - name: Check out code
        if: matrix.crate != 'noop'
        uses: actions/checkout@v7

      - name: Read crate version
        if: matrix.crate != 'noop'
        id: get-version
        run: |
          set -euo pipefail
          pkg="qmt-${{ matrix.crate }}"
          v=$(cargo pkgid -p "$pkg" | sed -E 's/.*@([^ ]+)$/\1/')

          if [[ -z "$v" ]] || [[ "$v" == *" "* ]] || [[ "$v" == *"="* ]] || [[ "$v" == *"workspace"* ]]; then
            echo "Invalid resolved version for $pkg: '$v'" >&2
            exit 1
          fi

          echo "Resolved $pkg version: $v"
          echo "VERSION=$v" >> "$GITHUB_ENV"

      - name: Set up Rust toolchain
        if: matrix.crate != 'noop' && matrix.provider_type == 'wasm'
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          target: wasm32-wasip1

      - name: Build Wasm binary
        if: matrix.crate != 'noop' && matrix.provider_type == 'wasm'
        run: cargo build -p qmt-${{ matrix.crate }} --release --target wasm32-wasip1

      - name: Log in to GHCR
        if: matrix.crate != 'noop' && matrix.provider_type == 'wasm'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Oras CLI
        if: matrix.crate != 'noop' && matrix.provider_type == 'wasm'
        uses: oras-project/setup-oras@v2

      - name: Create Wasm OCI config file
        if: matrix.crate != 'noop' && matrix.provider_type == 'wasm'
        run: echo '{}' > wasm-config.json

      - name: Push Wasm artifact to GHCR with Oras
        if: matrix.crate != 'noop' && matrix.provider_type == 'wasm'
        run: |
          IMAGE_BASE="ghcr.io/${{ github.repository_owner }}/${{ matrix.crate }}"

          if [[ "$GITHUB_REF_TYPE" == "tag" ]]; then
            ALIAS_TAG="stable"
          else
            ALIAS_TAG="latest"
          fi

          echo "Pushing Wasm artifact to ${IMAGE_BASE} with tags ${{ env.VERSION }} and ${ALIAS_TAG}"

          WASM_NAME=$(echo "qmt_${{ matrix.crate }}" | tr '-' '_')
          cp "target/wasm32-wasip1/release/${WASM_NAME}.wasm" "plugin.wasm"

          oras push "${IMAGE_BASE}:${{ env.VERSION }},${ALIAS_TAG}" \
            --config wasm-config.json:application/vnd.wasm.v1.config+json \
            --annotation "mt.query.plugin.type=extism" \
            --annotation "org.opencontainers.image.version=${{ env.VERSION }}" \
            plugin.wasm:application/vnd.wasm.v1.layer+wasm

      - name: Install Cosign
        if: matrix.crate != 'noop' && matrix.provider_type == 'wasm'
        uses: sigstore/cosign-installer@v4.1.2
        with:
          cosign-release: v2.6.0

      - name: Sign WASM artifact with Cosign (keyless)
        if: matrix.crate != 'noop' && matrix.provider_type == 'wasm'
        run: |
          IMAGE_BASE="ghcr.io/${{ github.repository_owner }}/${{ matrix.crate }}"

          # Resolve the digest of the just-pushed image for deterministic signing.
          # Both the version and stable/latest tags point to the same digest, so one
          # signature covers both.
          DIGEST=$(oras resolve "${IMAGE_BASE}:${{ env.VERSION }}")
          echo "Signing digest: ${DIGEST}"

          cosign sign --yes "${IMAGE_BASE}@${DIGEST}"
