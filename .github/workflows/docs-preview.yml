name: Documentation Preview

on:
  pull_request:
    types: [opened, synchronize, reopened, closed]
    paths:
      - 'docs/**'

permissions:
  contents: write
  pull-requests: write

jobs:
  deploy_preview:
    name: Deploy Preview
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt
        working-directory: ./docs

      - name: Build documentation
        run: zensical build
        working-directory: ./docs

      - name: Deploy preview to gh-pages
        run: |
          PR_DIR="pr-${{ github.event.number }}"

          # Save built site to a temporary location
          cp -r docs/site /tmp/site-output

          # Configure git
          git config user.name "GitHub Actions Bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # Switch to gh-pages branch
          git fetch origin gh-pages
          git checkout gh-pages

          # Replace the preview directory with the new build
          rm -rf "$PR_DIR"
          cp -r /tmp/site-output "$PR_DIR"

          # Commit and push
          git add -A
          git diff --cached --quiet || git commit -m "Deploy docs preview for PR #${{ github.event.number }}"
          git push origin gh-pages

      - name: Post preview link comment
        uses: actions/github-script@v8
        with:
          script: |
            const docsUrl = 'https://docs.query.mt';

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const botComment = comments.find(comment =>
              comment.user.type === 'Bot' && comment.body.includes('Documentation Preview')
            );

            const previewUrl = `${docsUrl}/pr-${context.issue.number}`;
            const commentBody = [
              '### Documentation Preview',
              '',
              'A preview for this pull request has been built and is available at:',
              '',
              `**[${previewUrl}](${previewUrl})**`,
              '',
              '*This preview will be automatically deleted when the pull request is closed.*'
            ].join('\n');

            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body: commentBody
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: commentBody
              });
            }

  cleanup_preview:
    name: Cleanup Preview
    if: github.event.action == 'closed'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout gh-pages branch
        uses: actions/checkout@v6
        with:
          ref: gh-pages

      - name: Remove preview directory
        run: |
          PR_DIR="pr-${{ github.event.number }}"

          git config user.name "GitHub Actions Bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if [ -d "$PR_DIR" ]; then
            git rm -rf "$PR_DIR"
            git commit -m "Remove docs preview for PR #${{ github.event.number }}"
            git push origin gh-pages
          fi
