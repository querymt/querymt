name: Deploy Documentation

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    name: Deploy Docs
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt
        working-directory: ./docs

      - name: Build documentation
        run: zensical build
        working-directory: ./docs

      - name: Deploy to gh-pages
        run: |
          # Save built site to a temporary location
          cp -r docs/site /tmp/site-output

          # Configure git
          git config user.name "GitHub Actions Bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # Switch to gh-pages branch
          git fetch origin gh-pages
          git checkout gh-pages

          # Replace the latest directory with the new build
          rm -rf latest
          cp -r /tmp/site-output latest

          # Ensure metadata files exist
          echo '[{"version":"latest","title":"latest","aliases":[]}]' > versions.json
          cat > index.html << 'EOF'
          <!DOCTYPE html>
          <html>
          <head><meta http-equiv="refresh" content="0; url=./latest/"></head>
          <body>Redirecting to <a href="./latest/">latest</a>...</body>
          </html>
          EOF
          touch .nojekyll

          # Commit and push (skip if no changes)
          git add -A
          git diff --cached --quiet || git commit -m "Deploy docs to latest"
          git push origin gh-pages
