name: Test Agent

on:
  push:
    branches: [main, master]
    paths:
      - 'crates/agent/**'
      - 'crates/querymt/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - '.github/workflows/test-agent.yml'
  pull_request:
    paths:
      - 'crates/agent/**'
      - 'crates/querymt/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - '.github/workflows/test-agent.yml'

env:
  features: 'dashboard,oauth,remote'

jobs:
  # Job 1: Check formatting (fast, fails first)
  format:
    name: Check formatting
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      
      - name: Check formatting
        run: cargo fmt --all -- --check

  # Job 2: Run Clippy (parallel with format)
  clippy:
    name: Clippy lints
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      
      - name: Cache Cargo dependencies
        uses: swatinem/rust-cache@v2
      
      - name: Run Clippy
        run: cargo clippy --package querymt-agent --all-targets --features "${features}" -- -D warnings

  # Job 3: Run tests with coverage
  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: [format, clippy]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      
      - name: Cache Cargo dependencies
        uses: swatinem/rust-cache@v2
      
      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Install cargo-nextest
        uses: taiki-e/install-action@nextest
      
      - name: Create coverage directory
        run: mkdir -p ./coverage

      - name: Run tests with coverage
        run: |
          cargo llvm-cov nextest \
            --package querymt-agent \
            --lib --tests \
            --features "${features}" \
            --codecov --output-path ./coverage/codecov.json
      
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage/codecov.json
          flags: agent
          verbose: true
          fail_ci_if_error: false

  # Job 4: Run UI tests
  ui-test:
    name: UI Tests
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
      
      - name: Install dependencies
        working-directory: crates/agent/ui
        run: npm ci
      
      - name: Run UI Tests
        working-directory: crates/agent/ui
        run: npm test

  # Job 5: Check that generated TypeScript types are up to date
  check-generated-types:
    name: Check generated types drift
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo dependencies
        uses: swatinem/rust-cache@v2

      - name: Install typeshare-cli
        run: cargo install typeshare-cli --locked

      - name: Regenerate types
        run: bash scripts/generate-types.sh

      - name: Check TypeScript drift
        run: |
          git diff --exit-code crates/agent/ui/src/generated/types.ts || \
          (echo "ERROR: generated/types.ts is out of date. Run scripts/generate-types.sh and commit." && exit 1)

      - name: Check Swift drift (if iOS sibling exists)
        run: |
          if [ -f ../querymt-ios/Sources/QueryMTIOSApp/Generated/Types.swift ]; then
            git diff --exit-code ../querymt-ios/Sources/QueryMTIOSApp/Generated/Types.swift || \
            (echo "ERROR: Generated Swift types are out of date. Run scripts/generate-types.sh and commit." && exit 1)
          else
            echo "querymt-ios sibling repo not present; skipping Swift drift check."
          fi

