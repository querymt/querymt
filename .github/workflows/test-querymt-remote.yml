name: Test querymt-remote

on:
  push:
    branches: [main, master]
    paths:
      - 'crates/querymt-remote/**'
      - 'crates/querymt/**'
      - 'crates/querymt-utils/**'
      - 'crates/provider-common/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - '.config/nextest.toml'
      - '.github/workflows/test-querymt-remote.yml'
  pull_request:
    paths:
      - 'crates/querymt-remote/**'
      - 'crates/querymt/**'
      - 'crates/querymt-utils/**'
      - 'crates/provider-common/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - '.config/nextest.toml'
      - '.github/workflows/test-querymt-remote.yml'

jobs:
  # Job 1: Check formatting (fast, fails first)
  format:
    name: Check formatting
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Check formatting
        run: cargo fmt --all -- --check

  # Job 2: Run Clippy (parallel with format)
  clippy:
    name: Clippy lints
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache Cargo dependencies
        uses: swatinem/rust-cache@v2
        with:
          key: querymt-remote-clippy

      - name: Run Clippy
        run: cargo clippy --package querymt-remote --all-targets --all-features -- -D warnings

  # Job 3: Run tests with coverage
  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: [format, clippy]

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo dependencies
        uses: swatinem/rust-cache@v2
        with:
          key: querymt-remote-test

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Install cargo-nextest
        uses: taiki-e/install-action@nextest

      - name: Create coverage directory
        run: mkdir -p ./coverage

      - name: Run tests with coverage
        run: |
          cargo llvm-cov nextest \
            --package querymt-remote \
            --lib --tests \
            --all-features \
            --codecov --output-path ./coverage/codecov.json

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage/codecov.json
          flags: querymt-remote
          verbose: true
          fail_ci_if_error: false
