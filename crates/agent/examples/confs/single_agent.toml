# Single Agent Configuration Example
#
# This demonstrates configuring a single AI agent with tools and MCP support.

[agent]
cwd = "."
db = "./agent.db"

# Provider configuration - supports env var interpolation
provider = "openai"
model = "${MODEL:-gpt-4}"
# api_key = "${OPENAI_API_KEY}"  # Uncomment to use API key from env

# Tools available to the agent
# Can be builtin tools or MCP tools using patterns:
# - "edit" - builtin tool
# - "github.*" - all tools from github MCP server
# - "github.search_repos" - specific tool from github MCP server
tools = [
    "read_tool",
    "edit", 
    "shell",
    "glob",
    "search_text"
]

# System prompt - can be a string, array of strings, or mixed with file references:
#   system = "inline prompt"
#   system = ["part1", "part2"]
#   system = ["inline", { file = "prompts/assistant.md" }]
system = "You are a helpful coding assistant."

# Optional: Middleware for advanced behavior
# Uncomment to enable plan mode (read-only observation and planning)
# [[middleware]]
# type = "plan_mode"
# enabled = true
# reminder = "You are in plan mode. Only observe, analyze, and plan. Do not make changes."

# Uncomment to enable context management with auto-compaction
# Note: auto_compact is controlled by [agent.execution.compaction].auto
# [[middleware]]
# type = "context"
# warn_at_percent = 80
# fallback_max_tokens = 64000

# Uncomment to enable duplicate code detection
# [[middleware]]
# type = "dedup_check"
# threshold = 0.85
# min_lines = 5

# ── Context Compression (opt-in) ─────────────────────────────────────
#
# Tool result compaction: deterministic compaction of large tool outputs.
# Keeps context small by replacing large results with bounded previews.
# Full output remains retrievable via context_search.
#
# Rollout: enable with `enabled = true` and add tools to `opt_in_tools`.
# Rollback: set `enabled = false` — all behavior reverts immediately.
#
# [agent.execution.tool_result_compaction]
# enabled = false                       # master switch (default: off)
# opt_in_tools = ["shell", "web_fetch"] # tools that get compacted
# min_bytes = 8192                      # minimum size to trigger
# index_backend = "sqlite_fts5"         # retrieval backend
#
# [agent.execution.tool_result_compaction.llm_summary]
# enabled = false                       # optional LLM summary (default: off)

# Routing guardrails: nudge agents toward context-safe tools.
# Rollout: set routing_preference to "warn" first, then "enforce".
# Rollback: set routing_preference to "off".
#
# [agent.execution.routing_guardrails]
# routing_preference = "off"  # off | warn | enforce
#
# [agent.execution.routing_guardrails.search_throttle]
# window_secs = 60
# max_calls = 20
# degrade_after = 10

# Optional: MCP servers for external tools
# [[mcp]]
# name = "github"
# transport = "stdio"
# command = "npx"
# args = ["-y", "@anthropic/mcp-server-github"]
# env = { GITHUB_TOKEN = "${GITHUB_TOKEN}" }
